<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barrett Garese</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --q1-bg: #0d0d0d;
      --q1-accent: #c8a96e;
      --q2-bg: #0a0e1a;
      --q2-accent: #6e8fc8;
      --q3-bg: #0e0d0a;
      --q3-accent: #2aba6a;
      --q4-bg: #0d0d0d;
      --q4-accent: #b5742a;
      --text-light: rgba(255,255,255,0.88);
      --text-dim: rgba(255,255,255,0.3);
      --center-size: 140px;
      --transition: 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d0d;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.4);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    }
    .cursor.hovering { width: 16px; height: 16px; }
    .cursor-ring.hovering { width: 56px; height: 56px; opacity: 0.6; }

    /* Grid */
    .grid {
      display: grid;
      width: 100vw;
      height: 100vh;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      position: relative;
    }

    /* Quadrants */
    .quadrant {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 48px 52px;
      text-decoration: none;
      transition: background var(--transition);
    }

    .quadrant::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition);
      background: radial-gradient(ellipse at var(--gx, 30%) var(--gy, 70%), var(--accent) 0%, transparent 65%);
      pointer-events: none;
    }

    .quadrant:hover::before { opacity: 0.12; }

    /* Noise grain overlay */
    .quadrant::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
      pointer-events: none;
    }

    /* Individual quadrant colors */
    .q1 { background: var(--q1-bg); --accent: var(--q1-accent); --gx: 80%; --gy: 20%; }
    .q2 { background: var(--q2-bg); --accent: var(--q2-accent); --gx: 20%; --gy: 20%; }
    .q3 { background: var(--q3-bg); --accent: var(--q3-accent); --gx: 80%; --gy: 80%; }
    .q4 { background: var(--q4-bg); --accent: var(--q4-accent); --gx: 20%; --gy: 80%; }

    /* Subtle border lines forming the cross */
    .q1 { border-right: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .q2 { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .q3 { border-right: 1px solid rgba(255,255,255,0.06); }

    /* Quadrant content */
    .q-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
      transition: color var(--transition);
    }

    .q-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(28px, 3.2vw, 48px);
      line-height: 1.1;
      color: var(--text-light);
      letter-spacing: -0.01em;
      transition: color var(--transition);
    }

    .q-title em {
      font-style: italic;
      font-weight: 300;
    }

    .q-arrow {
      position: absolute;
      top: 48px;
      right: 52px;
      width: 32px;
      height: 32px;
      opacity: 0;
      transform: translate(-8px, 8px);
      transition: opacity var(--transition), transform var(--transition);
    }

    .q-arrow svg {
      width: 100%;
      height: 100%;
    }

    .quadrant:hover .q-arrow {
      opacity: 0.5;
      transform: translate(0, 0);
    }

    .quadrant:hover .q-label {
      color: var(--accent);
    }

    .quadrant:hover .q-title {
      color: #fff;
    }

    /* Coming Soon treatment */
    .q4 .q-title {
      color: rgba(255,255,255,0.22);
      font-style: italic;
    }

    .q4:hover .q-title {
      color: rgba(255,255,255,0.38);
    }

    .q4 {
      cursor: default;
    }

    /* Center nameplate */
    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: var(--center-size);
      height: var(--center-size);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .center-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      position: relative;
    }

    /* Rotating ring */
    .center-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.04);
      animation: spin 24s linear infinite;
    }

    .center-ring::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .center-first {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      line-height: 1;
    }

    .center-last {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      line-height: 1;
    }

    /* Decorative corner numbers */
    .q-num {
      position: absolute;
      font-family: 'Cormorant Garamond', serif;
      font-size: 120px;
      font-weight: 300;
      color: rgba(255,255,255,0.02);
      line-height: 1;
      pointer-events: none;
      transition: color var(--transition);
      user-select: none;
    }

    .q1 .q-num { top: -20px; left: -8px; }
    .q2 .q-num { top: -20px; right: -8px; }
    .q3 .q-num { bottom: -20px; left: -8px; }
    .q4 .q-num { bottom: -20px; right: -8px; }

    .quadrant:hover .q-num {
      color: rgba(255,255,255,0.04);
    }

    /* Thin horizontal/vertical rule lines through center */
    .hairline-h, .hairline-v {
      position: absolute;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
      z-index: 5;
    }
    .hairline-h {
      width: 100vw;
      height: 1px;
      top: 50%;
      left: 0;
    }
    .hairline-v {
      height: 100vh;
      width: 1px;
      left: 50%;
      top: 0;
    }

    /* Fade in on load */
    .quadrant {
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .q1 { animation-delay: 0.05s; }
    .q2 { animation-delay: 0.15s; }
    .q3 { animation-delay: 0.1s; }
    .q4 { animation-delay: 0.2s; }
    .center { animation: fadeIn 1.1s ease 0.3s both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      :root { --center-size: 100px; }
      .quadrant { padding: 28px 28px; }
      .q-arrow { top: 28px; right: 28px; }
      .q-title { font-size: clamp(22px, 6vw, 32px); }
      .q-num { font-size: 80px; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="grid">

  <!-- Q1: EnjoyThis -->
  <a class="quadrant q1" href="https://enjoythis.app" target="_blank" rel="noopener">
    <span class="q-num">1</span>
    <div class="q-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" color="white">
        <path d="M7 17L17 7M17 7H7M17 7v10"/>
      </svg>
    </div>
    <div class="q-label">Your "I thought you'd love this" inbox</div>
    <div class="q-title"><em>EnjoyThis</em></div>
  </a>

  <!-- Q2: The Evening Saga -->
  <a class="quadrant q2" href="https://theeveningsaga.com" target="_blank" rel="noopener">
    <span class="q-num">2</span>
    <div class="q-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" color="white">
        <path d="M7 17L17 7M17 7H7M17 7v10"/>
      </svg>
    </div>
    <div class="q-label">Ongoing Science Fiction</div>
    <div class="q-title"><em>The Evening<br>Saga</em></div>
  </a>

  <!-- Q3: FanSpark -->
  <a class="quadrant q3" href="https://fanspark.pro" target="_blank" rel="noopener">
    <span class="q-num">3</span>
    <div class="q-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" color="white">
        <path d="M7 17L17 7M17 7H7M17 7v10"/>
      </svg>
    </div>
    <div class="q-label">Sports &amp; Creator Economy</div>
    <div class="q-title"><em>FanSpark.pro</em></div>
  </a>

  <!-- Q4: Coming Soon -->
  <div class="quadrant q4">
    <span class="q-num">4</span>
    <div class="q-label">Coming Soon</div>
    <div class="q-title"><em>Something<br>New</em></div>
  </div>

  <!-- Center -->
  <div class="center">
    <div class="center-inner">
      <div class="center-ring"></div>
      <span class="center-first">BARRETT.</span>
    </div>
  </div>

</div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  // Smooth ring follow
  function animRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animRing);
  }
  animRing();

  // Hover state on links
  document.querySelectorAll('a.quadrant').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.classList.add('hovering');
      ring.classList.add('hovering');
    });
    el.addEventListener('mouseleave', () => {
      cursor.classList.remove('hovering');
      ring.classList.remove('hovering');
    });
  });
</script>

</body>
</html>
